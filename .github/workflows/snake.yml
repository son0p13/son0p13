name: Generate Snake Animation

on:
  # Chạy tự động mỗi 24 giờ (vào lúc nửa đêm UTC)
  schedule:
    - cron: "0 0 * * *" 
  
  # Cho phép bạn tự bấm nút chạy thủ công bất cứ lúc nào
  workflow_dispatch:
  
  # Chạy tự động mỗi khi có code mới được đẩy lên nhánh main
  push:
    branches:
      - main # (Đổi thành 'master' nếu nhánh mặc định của bạn tên là master)

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      # Hành động 1: Tạo file ảnh con rắn (.svg) từ lịch sử commit của bạn
      - name: Generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # Hành động 2: Đẩy file ảnh vừa tạo lên một nhánh riêng tên là 'output'
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
